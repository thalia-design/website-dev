<!DOCTYPE html>
<html lang="fr">

<head>
    <title>{p%documentTitle%}</title>
    <script type="module" src="{%dirDepth%}main.js"></script>
</head>

<body>

    <main>

        <import-html src="import/html/section-main-head.html"/>

        <div class="section-main-gallery">

            <import-html src="import/html/section-main-gallery--head.html"/>

            <wrapper class="page-content-container">
                <div id="swup" class="page-content swup-transition--project">
                    <wrapper>

                        <h1 class="project-title" hidden>{p%title%}</h1>

                        <div class="project-layout span-to-top">

                            <wrapper class="content-head">

                                <div thalia-p-section-name="project" thalia-p-section-type="image" class="width-fill media-fill-width media-height-large">
                                    <wrapper>
                                        <import-html src="import/html/p/img.html" mediaURL="{%ap%}/{%p%}/thumbnail.jpg"/>
                                    </wrapper>
                                </div>

                                <div thalia-p-section-name="edito" class="width-simple space">
                                    <div class="desc">
                                        <p>
                                        </p>
                                        <p>
                                        </p>
                                    </div>

                                    <div class="filters" thalia-gallery-filters--insert="{p%filters%}"></div>
                                </div>

                            </wrapper>
                            <wrapper class="content-body">

                                <div class="width-full" style="overflow: hidden;">
                                    <div class="width-halffill">
                                        <section class="embla" style="max-width: 1100px;">
                                            <div class="embla__viewport">
                                                <div class="embla__container media-hug-height">
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-accueil.jpg"/></div>
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-connexion.jpg"/></div>
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-depots.jpg"/></div>
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-messagerie-conversation.jpg"/></div>
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-notification.jpg"/></div>
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-taches.jpg"/></div>
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-planning-graphiste.jpg"/></div>
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-profil-graphiste.jpg"/></div>
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-projets-global.jpg"/></div>
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-projets-nouveau.jpg"/></div>
<div class="embla__slide"><import-html src="import/html/p/img-lazy.html" mediaURL="{%ap%}/{%p%}/vue-statistiques.jpg"/></div>
                                                </div>
                                            </div>
                                            <div class="embla__controls">
                                                <div class="embla__buttons">
                                                    <button
                                                        class="embla__button embla__button--prev embla__button--disabled interaction-btn"
                                                        type="button"
                                                    >
                                                        <svg class="embla__button__svg svg-s" viewBox="0 0 64 64" aria-hidden="true">
                                                            <polyline points="40,12 24,32 40,52"/>
                                                        </svg>
                                                    </button>
                                                    <button
                                                        class="embla__button embla__button--next embla__button--disabled interaction-btn"
                                                        type="button"
                                                    >
                                                        <svg class="embla__button__svg svg-s" viewBox="0 0 64 64" aria-hidden="true">
                                                            <polyline points="24,12 40,32 24,52"/>
                                                        </svg>
                                                    </button>
                                                </div>
                                                <div class="embla__scrollbar-shell">
                                                    <input
                                                        class="embla__scrollbar"
                                                        type="range"
                                                        id="slider"
                                                        min="0"
                                                        max="1"
                                                        step="0.001"
                                                        value="0"
                                                    />
                                                </div>
                                                <div class="embla__selected-snap-display">1 / 0</div>
                                            </div>
                                        </section>
                                    </div>
                                </div>

                            </wrapper>

                        </div>

                    </wrapper>

                    <import-html src="import/html/p/project-prev-next.html"/>
                </div>
            </wrapper>

        </div>

        <import-html src="import/html/section-footer.html"/>

    </main>

</body>
</html>
